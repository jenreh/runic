# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

silent: true

vars:
  RUNNER: uv run

tasks:
  # ----------------------------------------------------------------------------
  # Quality Assurance (Tests, Lint, Format)
  # ----------------------------------------------------------------------------

  test:
    desc: Run pytest with coverage (unit + embedded-FalkorDB integration tests)
    cmd: "{{.RUNNER}} pytest --cov"

  test:unit:
    desc: Run unit tests only (no live backend required)
    cmd: "{{.RUNNER}} pytest -m 'not integration' --cov"

  test:integration:up:
    desc: Start test backend containers (Neo4j, Memgraph, ArcadeDB, AGE)
    cmd: docker compose -f docker-compose.test.yml up -d --wait

  test:integration:down:
    desc: Stop and remove test backend containers
    cmd: docker compose -f docker-compose.test.yml down -v

  test:integration:
    desc: Run integration tests against all configured backends (set RUNIC_TEST_BACKENDS)
    cmd: "{{.RUNNER}} pytest -m integration --cov"

  lint:
    desc: Run linting with ruff
    cmd: "{{.RUNNER}} ruff check ."

  format:
    desc: Format code with ruff
    cmds:
      - "{{.RUNNER}} ruff check --fix ."
      - "{{.RUNNER}} ruff format ."

  typecheck:
    desc: Run ty type checking
    cmd: "{{.RUNNER}} ty check ."
