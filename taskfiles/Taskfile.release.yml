# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

silent: true

vars:
  PROJECT: runic
  IMAGE_NAME: runic
  RUNNER: uv run

tasks:
  default:
    desc: Show available commands
    cmd: task --list

  # ----------------------------------------------------------------------------
  # Release Commands
  # ----------------------------------------------------------------------------

  build:
    desc: |
      Usage: task release:build -- [major|minor|patch], defaults to 'patch'.
      Bumps version, commits, and creates a GitHub release.
    cmds:
      - uvx bump-my-version bump {{.CLI_ARGS | default "patch"}}
      - uv sync
      - git add -A
      - 'git diff --cached --quiet || git commit -m "chore: release v$(grep ''^version = '' pyproject.toml | cut -d ''"'' -f2)"'
      - git push
      - |
        NEW_VERSION=v$(grep '^version = ' pyproject.toml | cut -d '"' -f2)
        uv run python scripts/generate_changelog.py "$NEW_VERSION" > /tmp/runic_changelog.md
        gh release create "$NEW_VERSION" --title "$NEW_VERSION" --notes-file /tmp/runic_changelog.md
