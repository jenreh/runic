services:
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  neo4j:
    image: neo4j:5.26.0-community
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      NEO4J_AUTH: none
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474/ 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  memgraph:
    image: memgraph/memgraph:latest
    ports:
      - "7688:7687"
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/7687' && exit 0 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15

  arcadedb:
    image: arcadedata/arcadedb:latest
    ports:
      - "2480:2480"
      - "2424:2424"
    environment:
      JAVA_OPTS: "-Darcadedb.server.rootPassword=playwithdata"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2480/api/v1/ready || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15

  age:
    image: apache/age:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 12
